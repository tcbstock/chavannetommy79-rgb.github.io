<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCB — Gestion du stock bar</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #111318;
    --surface:  #1a1d24;
    --surface2: #22262f;
    --surface3: #2a2f3a;
    --border:   rgba(255,255,255,0.08);
    --border2:  rgba(255,255,255,0.16);
    --text:     #e8eaf0;
    --text2:    #8b909e;
    --text3:    #55596a;
    --blue:     #3b82f6;
    --blue-dim: rgba(59,130,246,0.15);
    --green:    #4ade80;
    --green-bg: rgba(74,222,128,0.1);
    --amber:    #fbbf24;
    --amber-bg: rgba(251,191,36,0.1);
    --red:      #f87171;
    --red-bg:   rgba(248,113,113,0.1);
    --gold:     #f59e0b;
    --gold-bg:  rgba(245,158,11,0.12);
    --gold-border: rgba(245,158,11,0.35);
    --radius:   12px; --radius-sm: 8px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 60px; }

  header { position: sticky; top: 0; z-index: 10; background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; letter-spacing: 0.5px; color: var(--text); }
  .logo-badge { background: var(--blue); color: #fff; font-size: 12px; font-weight: 800; padding: 4px 9px; border-radius: 6px; letter-spacing: 1px; }
  .logo span { font-size: 12px; font-weight: 400; color: var(--text3); }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.ok { background: var(--green); }
  .sync-dot.loading { background: var(--amber); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-add { background: var(--blue); color: #fff; border: none; border-radius: var(--radius-sm); padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: 0.3px; transition: opacity 0.15s; }
  .btn-add:hover { opacity: 0.85; }

  /* Bandeau événement */
  .event-banner {
    margin: 14px 20px 0;
    background: var(--gold-bg);
    border: 1px solid var(--gold-border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .event-banner-left { display: flex; align-items: center; gap: 10px; }
  .event-banner-icon { font-size: 18px; line-height: 1; }
  .event-banner-text { font-size: 13px; color: var(--gold); font-weight: 600; }
  .event-banner-sub  { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .event-banner-count { font-size: 22px; font-weight: 700; color: var(--gold); min-width: 24px; text-align: right; }

  .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 14px 20px 0; }
  .stat { background: var(--surface); border-radius: var(--radius-sm); padding: 14px 16px; border: 1px solid var(--border); position: relative; overflow: hidden; }
  .stat::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; border-radius: 3px 0 0 3px; }
  .stat.s-total::before { background: var(--blue); }
  .stat.s-red::before   { background: var(--red); }
  .stat.s-amber::before { background: var(--amber); }
  .stat.s-green::before { background: var(--green); }
  .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 26px; font-weight: 700; }
  .stat.s-total .stat-value { color: var(--blue); }
  .stat.s-red   .stat-value { color: var(--red); }
  .stat.s-amber .stat-value { color: var(--amber); }
  .stat.s-green .stat-value { color: var(--green); }

  .filters { display: flex; gap: 8px; padding: 14px 20px; overflow-x: auto; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn { white-space: nowrap; font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); font-weight: 600; }
  .filter-btn.active-event { background: var(--gold-bg); border-color: var(--gold-border); color: var(--gold); font-weight: 600; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(162px, 1fr)); gap: 10px; padding: 0 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; cursor: pointer; transition: border-color 0.15s, background 0.15s; position: relative; }
  .card:hover { border-color: var(--border2); background: var(--surface2); }
  .card.status-low  { border-top: 2px solid var(--red); }
  .card.status-warn { border-top: 2px solid var(--amber); }
  .card.status-ok   { border-top: 2px solid var(--blue); }
  .card.event-flag  { border-color: var(--gold-border) !important; border-top: 2px solid var(--gold) !important; }

  /* Trophée toggle sur la carte */
  .trophy-btn {
    position: absolute; top: 10px; right: 10px;
    width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid var(--border2);
    background: var(--surface3);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    z-index: 2; line-height: 1;
    filter: grayscale(1) opacity(0.4);
  }
  .trophy-btn:hover { filter: grayscale(0) opacity(0.8); border-color: var(--gold-border); }
  .trophy-btn.active {
    background: var(--gold-bg); border-color: var(--gold-border);
    filter: grayscale(0) opacity(1);
  }

  .card-emoji { font-size: 26px; margin-bottom: 8px; display: block; line-height: 1; }
  .card-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 24px; }
  .card-cat { font-size: 11px; color: var(--text3); margin-bottom: 10px; }
  .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 99px; letter-spacing: 0.4px; margin-bottom: 8px; text-transform: uppercase; }
  .badge.low  { background: var(--red-bg);   color: var(--red); }
  .badge.warn { background: var(--amber-bg); color: var(--amber); }
  .badge.ok   { background: var(--blue-dim); color: var(--blue); }
  .badge.event { background: var(--gold-bg); color: var(--gold); margin-left: 4px; }
  .bar-track { height: 4px; background: var(--surface3); border-radius: 99px; overflow: hidden; margin-bottom: 10px; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width 0.3s; }
  .bar-fill.low  { background: var(--red); }
  .bar-fill.warn { background: var(--amber); }
  .bar-fill.ok   { background: var(--blue); }
  .qty-row { display: flex; align-items: center; justify-content: space-between; }
  .qty-info { font-size: 11px; color: var(--text2); line-height: 1.5; }
  .qty-info strong { color: var(--text); font-size: 13px; }
  .qty-btns { display: flex; gap: 4px; }
  .qty-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface3); cursor: pointer; font-size: 16px; font-weight: 500; color: var(--text); display: flex; align-items: center; justify-content: center; line-height: 1; transition: background 0.1s; }
  .qty-btn:hover { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
  .card-add { border: 1px dashed var(--border2); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; color: var(--text3); font-size: 13px; padding: 14px; min-height: 160px; transition: background 0.15s, color 0.15s, border-color 0.15s; }
  .card-add:hover { background: var(--surface); color: var(--blue); border-color: var(--blue); }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
  .overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 380px; border: 1px solid var(--border2); max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 20px; color: var(--text); }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 11px; font-weight: 600; color: var(--text3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-row input, .form-row select { width: 100%; padding: 9px 12px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s; }
  .form-row input:focus, .form-row select:focus { border-color: var(--blue); }
  .form-row select option { background: var(--surface2); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .hint { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
  .modal-actions button { flex: 1; padding: 10px; border-radius: var(--radius-sm); border: 1px solid var(--border2); font-size: 14px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text); transition: background 0.15s; }
  .modal-actions button:hover { background: var(--surface2); }
  .modal-actions .btn-save { background: var(--blue); color: #fff; border-color: transparent; }
  .modal-actions .btn-save:hover { opacity: 0.85; }
  .btn-delete { width: 100%; margin-top: 10px; padding: 9px; border-radius: var(--radius-sm); border: 1px solid rgba(248,113,113,0.2); background: transparent; color: var(--red); font-size: 13px; cursor: pointer; transition: background 0.15s; }
  .btn-delete:hover { background: var(--red-bg); }
  .loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 200; }
  .loading-screen p { font-size: 14px; color: var(--text2); }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @media (max-width: 480px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }
</style>
</head>
<body>

<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <p>Connexion en cours…</p>
</div>

<header>
  <div class="logo">
    <span class="logo-badge">TCB</span>
    Bar Stock
    <span id="date-label"></span>
  </div>
  <div class="header-right">
    <div class="sync-dot loading" id="sync-dot" title="Synchronisation Firebase"></div>
    <button class="btn-add" onclick="openAdd()">+ Ajouter</button>
  </div>
</header>

<div id="event-banner"></div>
<div class="stats-bar" id="stats"></div>
<div class="filters" id="filters"></div>
<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-title">Nouveau produit</h2>
    <div class="form-row">
      <label>Nom du produit</label>
      <input type="text" id="f-name" placeholder="Ex: Coca Original" />
    </div>
    <div class="form-row">
      <label>Catégorie</label>
      <select id="f-cat">
        <option value="🥤 Soft">🥤 Soft</option>
        <option value="🍺 Bière">🍺 Bière</option>
        <option value="🍷 Vin">🍷 Vin</option>
        <option value="🍫 Snack sucré">🍫 Snack sucré</option>
        <option value="🥨 Snack salé">🥨 Snack salé</option>
        <option value="🍽️ Food">🍽️ Food</option>
      </select>
    </div>
    <div class="form-row">
      <label>Unité</label>
      <select id="f-unit">
        <option value="canette">Canette</option>
        <option value="bouteille">Bouteille</option>
        <option value="fût">Fût</option>
        <option value="paquet">Paquet</option>
        <option value="portion">Portion</option>
        <option value="pièce">Pièce</option>
      </select>
    </div>
    <div class="two-col">
      <div class="form-row">
        <label>Quantité actuelle</label>
        <input type="number" id="f-qty" min="0" value="0" />
        <div class="hint" id="f-unit-hint">En canettes</div>
      </div>
      <div class="form-row">
        <label>Seuil d'alerte</label>
        <input type="number" id="f-min" min="0" value="6" />
        <div class="hint">En dessous = alerte</div>
      </div>
    </div>
    <div class="modal-actions">
      <button onclick="closeModal()">Annuler</button>
      <button class="btn-save" onclick="saveItem()">Enregistrer</button>
    </div>
    <button class="btn-delete" id="btn-delete" onclick="deleteItem()" style="display:none">
      Supprimer ce produit
    </button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  databaseURL: "https://bar-tennis-stock-default-rtdb.europe-west1.firebasedatabase.app"
};

const app   = initializeApp(firebaseConfig);
const db    = getDatabase(app);
const dbRef = ref(db, 'stock');

const EMOJIS    = {"🥤 Soft":"🥤","🍺 Bière":"🍺","🍷 Vin":"🍷","🍫 Snack sucré":"🍫","🥨 Snack salé":"🥨","🍽️ Food":"🍽️"};
const CAT_ORDER = ["🥤 Soft","🍺 Bière","🍷 Vin","🍫 Snack sucré","🥨 Snack salé","🍽️ Food"];

const DEFAULT_ITEMS = [
  {id:1,  name:"Coca Original",       cat:"🥤 Soft",        unit:"canette",   qty:0, min:12, event:false},
  {id:2,  name:"Coca Zéro",           cat:"🥤 Soft",        unit:"canette",   qty:0, min:12, event:false},
  {id:3,  name:"Coca Cherry",         cat:"🥤 Soft",        unit:"canette",   qty:0, min:12, event:false},
  {id:4,  name:"Perrier",             cat:"🥤 Soft",        unit:"canette",   qty:0, min:12, event:false},
  {id:5,  name:"Schweppes",           cat:"🥤 Soft",        unit:"canette",   qty:0, min:12, event:false},
  {id:6,  name:"Ice Tea",             cat:"🥤 Soft",        unit:"canette",   qty:0, min:12, event:false},
  {id:7,  name:"Orangina",            cat:"🥤 Soft",        unit:"canette",   qty:0, min:12, event:false},
  {id:8,  name:"Oasis Tropical",      cat:"🥤 Soft",        unit:"canette",   qty:0, min:12, event:false},
  {id:9,  name:"Oasis Orange",        cat:"🥤 Soft",        unit:"canette",   qty:0, min:12, event:false},
  {id:10, name:"Fanta Orange",        cat:"🥤 Soft",        unit:"canette",   qty:0, min:12, event:false},
  {id:11, name:"Powerade Bleu",       cat:"🥤 Soft",        unit:"canette",   qty:0, min:12, event:false},
  {id:12, name:"Powerade Rouge",      cat:"🥤 Soft",        unit:"canette",   qty:0, min:12, event:false},
  {id:13, name:"Limonade",            cat:"🥤 Soft",        unit:"canette",   qty:0, min:12, event:false},
  {id:14, name:"Bière Rouge",         cat:"🍺 Bière",       unit:"bouteille", qty:0, min:6,  event:false},
  {id:15, name:"Bière Blanche",       cat:"🍺 Bière",       unit:"bouteille", qty:0, min:6,  event:false},
  {id:16, name:"Bière Chouffe",       cat:"🍺 Bière",       unit:"bouteille", qty:0, min:6,  event:false},
  {id:17, name:"Fût IPA",             cat:"🍺 Bière",       unit:"fût",       qty:0, min:1,  event:false},
  {id:18, name:"Fût Blonde",          cat:"🍺 Bière",       unit:"fût",       qty:0, min:1,  event:false},
  {id:19, name:"Vin Rouge",           cat:"🍷 Vin",         unit:"bouteille", qty:0, min:3,  event:false},
  {id:20, name:"Croque Monsieur",     cat:"🍽️ Food",        unit:"portion",   qty:0, min:3,  event:false},
  {id:21, name:"Nuggets",             cat:"🍽️ Food",        unit:"portion",   qty:0, min:3,  event:false},
  {id:22, name:"Plateau Charcuterie", cat:"🍽️ Food",        unit:"portion",   qty:0, min:2,  event:false},
  {id:23, name:"Tapenade",            cat:"🍽️ Food",        unit:"portion",   qty:0, min:2,  event:false},
  {id:24, name:"Chips",               cat:"🥨 Snack salé",  unit:"paquet",    qty:0, min:5,  event:false},
  {id:25, name:"Cacahuètes",          cat:"🥨 Snack salé",  unit:"paquet",    qty:0, min:5,  event:false},
  {id:26, name:"Saucisson",           cat:"🥨 Snack salé",  unit:"pièce",     qty:0, min:3,  event:false},
  {id:27, name:"Kinder Bueno",        cat:"🍫 Snack sucré", unit:"paquet",    qty:0, min:5,  event:false},
  {id:28, name:"Kit Kat",             cat:"🍫 Snack sucré", unit:"paquet",    qty:0, min:5,  event:false},
  {id:29, name:"Lion",                cat:"🍫 Snack sucré", unit:"paquet",    qty:0, min:5,  event:false},
  {id:30, name:"Snickers",            cat:"🍫 Snack sucré", unit:"paquet",    qty:0, min:5,  event:false},
  {id:31, name:"Twix",                cat:"🍫 Snack sucré", unit:"paquet",    qty:0, min:5,  event:false},
  {id:32, name:"M&M's",               cat:"🍫 Snack sucré", unit:"paquet",    qty:0, min:5,  event:false},
];

let items = [], filter = "Tout", editId = null, firstLoad = true;
const syncDot = document.getElementById('sync-dot');
const loading = document.getElementById('loading');

function setSyncState(s) { syncDot.className = 'sync-dot ' + s; }

onValue(dbRef, (snapshot) => {
  const data = snapshot.val();
  items = data ? Object.values(data) : DEFAULT_ITEMS.map(i => ({...i}));
  if (!data) pushAll();
  if (firstLoad) { loading.style.display = 'none'; firstLoad = false; }
  setSyncState('ok');
  render();
}, () => { setSyncState('error'); loading.style.display = 'none'; });

function pushAll() {
  setSyncState('loading');
  const obj = {};
  items.forEach(i => { obj['item_' + i.id] = i; });
  set(dbRef, obj).then(() => setSyncState('ok')).catch(() => setSyncState('error'));
}
function pushItem(item) {
  setSyncState('loading');
  set(ref(db, 'stock/item_' + item.id), item)
    .then(() => setSyncState('ok')).catch(() => setSyncState('error'));
}
function removeItem(id) {
  setSyncState('loading');
  remove(ref(db, 'stock/item_' + id))
    .then(() => setSyncState('ok')).catch(() => setSyncState('error'));
}

function getStatus(i) {
  if (i.qty === 0) return 'low';
  if (i.qty <= i.min) return 'warn';
  return 'ok';
}
function getBarPct(i) {
  return Math.min(100, Math.round((i.qty / Math.max(i.min * 2, i.qty, 1)) * 100));
}

window.toggleEvent = (id, e) => {
  e.stopPropagation();
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.event = !item.event;
  pushItem(item);
};

function render() {
  document.getElementById('date-label').textContent =
    new Date().toLocaleDateString('fr-FR', {day:'numeric', month:'long'});

  const low      = items.filter(i => getStatus(i) === 'low').length;
  const warn     = items.filter(i => getStatus(i) === 'warn').length;
  const ok       = items.filter(i => getStatus(i) === 'ok').length;
  const eventCount = items.filter(i => i.event).length;

  // Bandeau événement
  const banner = document.getElementById('event-banner');
  if (eventCount > 0) {
    banner.innerHTML = `<div class="event-banner">
      <div class="event-banner-left">
        <span class="event-banner-icon">🏆</span>
        <div>
          <div class="event-banner-text">Événement à venir</div>
          <div class="event-banner-sub">Produits à commander en priorité</div>
        </div>
      </div>
      <div class="event-banner-count">${eventCount}</div>
    </div>`;
  } else {
    banner.innerHTML = '';
  }

  document.getElementById('stats').innerHTML = `
    <div class="stat s-total"><div class="stat-label">Produits</div><div class="stat-value">${items.length}</div></div>
    <div class="stat s-red">  <div class="stat-label">Rupture</div> <div class="stat-value">${low}</div></div>
    <div class="stat s-amber"><div class="stat-label">Alerte</div>  <div class="stat-value">${warn}</div></div>
    <div class="stat s-green"><div class="stat-label">OK</div>      <div class="stat-value">${ok}</div></div>`;

  const usedCats = ["Tout", ...CAT_ORDER.filter(c => items.some(i => i.cat === c))];
  const eventFilterActive = filter === '__event__';
  document.getElementById('filters').innerHTML =
    usedCats.map(c =>
      `<button class="filter-btn ${!eventFilterActive && filter===c ? 'active' : ''}" onclick="setFilter(${JSON.stringify(c)})">${c}</button>`
    ).join('') +
    (eventCount > 0
      ? `<button class="filter-btn ${eventFilterActive ? 'active-event' : ''}" onclick="setFilter('__event__')">🏆 Événement (${eventCount})</button>`
      : '');

  let shown = filter === '__event__'
    ? items.filter(i => i.event)
    : filter === "Tout" ? items : items.filter(i => i.cat === filter);

  const sorted = [...shown].sort((a, b) => {
    // Les produits événement remontent en premier
    if (a.event && !b.event) return -1;
    if (!a.event && b.event) return 1;
    return ({low:0,warn:1,ok:2})[getStatus(a)] - ({low:0,warn:1,ok:2})[getStatus(b)];
  });

  document.getElementById('grid').innerHTML = sorted.map(item => {
    const s   = getStatus(item);
    const pct = getBarPct(item);
    const em  = EMOJIS[item.cat] || '📦';
    const u   = item.unit || '';
    const pl  = item.qty > 1 && u !== 'fût' ? 's' : '';
    const bl  = s === 'low' ? 'Rupture' : s === 'warn' ? 'Alerte' : 'OK';
    return `<div class="card status-${s}${item.event ? ' event-flag' : ''}" onclick="openEdit(${item.id})">
      <button class="trophy-btn ${item.event ? 'active' : ''}" onclick="toggleEvent(${item.id}, event)" title="Marquer pour événement">🏆</button>
      <span class="card-emoji">${em}</span>
      <div class="badge ${s}">${bl}</div>${item.event ? '<span class="badge event">Événement</span>' : ''}
      <div class="card-name" title="${item.name}">${item.name}</div>
      <div class="card-cat">${item.cat.replace(/[\u{1F300}-\u{1FFFF}]/gu,'').trim()}</div>
      <div class="bar-track"><div class="bar-fill ${s}" style="width:${pct}%"></div></div>
      <div class="qty-row">
        <div class="qty-info"><strong>${item.qty}</strong> ${u}${pl}<br><span>seuil : ${item.min}</span></div>
        <div class="qty-btns" onclick="event.stopPropagation()">
          <button class="qty-btn" onclick="change(${item.id},-1)">−</button>
          <button class="qty-btn" onclick="change(${item.id},+1)">+</button>
        </div>
      </div>
    </div>`;
  }).join('') + `<div class="card-add" onclick="openAdd()">＋ Nouveau produit</div>`;
}

window.setFilter = c => { filter = c; render(); };
window.change = (id, delta) => {
  const item = items.find(i => i.id === id);
  if (!item) return;
  item.qty = Math.max(0, item.qty + delta);
  pushItem(item);
};

function syncUnitHint() {
  document.getElementById('f-unit-hint').textContent = 'En ' + document.getElementById('f-unit').value + 's';
}

window.openAdd = () => {
  editId = null;
  document.getElementById('modal-title').textContent = 'Nouveau produit';
  document.getElementById('f-name').value  = '';
  document.getElementById('f-cat').value   = '🥤 Soft';
  document.getElementById('f-unit').value  = 'canette';
  document.getElementById('f-qty').value   = '0';
  document.getElementById('f-min').value   = '6';
  document.getElementById('btn-delete').style.display = 'none';
  syncUnitHint();
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 50);
};

window.openEdit = id => {
  editId = id;
  const item = items.find(i => i.id === id);
  if (!item) return;
  document.getElementById('modal-title').textContent = 'Modifier · ' + item.name;
  document.getElementById('f-name').value  = item.name;
  document.getElementById('f-cat').value   = item.cat;
  document.getElementById('f-unit').value  = item.unit || 'bouteille';
  document.getElementById('f-qty').value   = item.qty;
  document.getElementById('f-min').value   = item.min;
  document.getElementById('btn-delete').style.display = 'block';
  syncUnitHint();
  document.getElementById('overlay').classList.add('open');
};

window.closeModal = () => { document.getElementById('overlay').classList.remove('open'); editId = null; };

window.saveItem = () => {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const cat  = document.getElementById('f-cat').value;
  const unit = document.getElementById('f-unit').value;
  const qty  = Math.max(0, parseInt(document.getElementById('f-qty').value) || 0);
  const min  = Math.max(0, parseInt(document.getElementById('f-min').value) || 0);
  if (editId) {
    const item = items.find(i => i.id === editId);
    Object.assign(item, {name, cat, unit, qty, min});
    pushItem(item);
  } else {
    const newItem = {id: Date.now(), name, cat, unit, qty, min, event: false};
    items.push(newItem);
    pushItem(newItem);
  }
  closeModal();
};

window.deleteItem = () => {
  if (!editId) return;
  const item = items.find(i => i.id === editId);
  if (!item || !confirm(`Supprimer "${item.name}" ?`)) return;
  removeItem(editId);
  closeModal();
};

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.getElementById('f-unit').addEventListener('change', syncUnitHint);
</script>
</body>
</html>
